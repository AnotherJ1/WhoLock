name: Release

on:
  push:
    tags:
      - 'v*.*.*'        # 例如 v0.1.0、v1.2.3
  workflow_dispatch:    # 允许手动触发（用于测试）

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write       # 创建 Release 需要

jobs:
  build:
    name: Build Release Binary
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Extract version
        id: meta
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.*)$') {
            $version = $Matches[1]
          } else {
            $version = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: cargo build --release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify binary
        shell: pwsh
        run: |
          $exe = "target\x86_64-pc-windows-msvc\release\file-lock-inspector.exe"
          if (-not (Test-Path $exe)) { throw "Binary not found: $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "Binary size: $([math]::Round($size/1MB, 2)) MB"

      - name: Package release zip
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $stage = "stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\file-lock-inspector.exe" "$stage\file-lock-inspector.exe"
          Copy-Item "README.md" "$stage\README.md"
          if (Test-Path "LICENSE-MIT")    { Copy-Item "LICENSE-MIT"    "$stage\" }
          if (Test-Path "LICENSE-APACHE") { Copy-Item "LICENSE-APACHE" "$stage\" }
          if (Test-Path "LICENSE")        { Copy-Item "LICENSE"        "$stage\" }
          $zipName = "file-lock-inspector-$version-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "$stage\*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"
          # 计算 SHA256
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -Encoding ASCII "$zipName.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            file-lock-inspector-*.zip
            file-lock-inspector-*.zip.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: ./dist

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          version="${{ needs.build.outputs.version }}"
          {
            echo "## File Lock Inspector v$version"
            echo
            echo "Windows desktop tool to identify and force-terminate processes locking files/folders."
            echo
            echo "### 📦 Downloads"
            echo
            echo "- \`file-lock-inspector-$version-x86_64-pc-windows-msvc.zip\` — Single executable bundle (Windows 10 1809+, x86_64)"
            echo
            echo "### ✅ Verification"
            echo
            echo "Verify download integrity using the \`.sha256\` file:"
            echo
            echo '```powershell'
            echo "(Get-FileHash file-lock-inspector-$version-x86_64-pc-windows-msvc.zip -Algorithm SHA256).Hash"
            echo '```'
            echo
            echo "### 🚀 Quick Start"
            echo
            echo "1. Extract the zip"
            echo "2. Run \`file-lock-inspector.exe\`"
            echo "3. Drag a file or folder into the window"
            echo
            echo "See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation."
          } > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: File Lock Inspector ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            dist/*.zip
            dist/*.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
